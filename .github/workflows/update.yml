name: Nava Job Board Sync

on:
  schedule:
    # This runs the script every 4 hours. 
    - cron: '0 */4 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually anytime.

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save jobs.json back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create Google Credentials File
        # This securely takes your vault secret and creates the temporary file the script needs
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google-credentials.json

      - name: Run the Sync Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js

      - name: Save Updated Jobs back to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add jobs.json job_cache.json
          git commit -m "Automated job board update" || echo "No changes to commit"
          git push
